name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Call Gemini API
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # 1. Use Python to build the entire JSON object safely
          python3 -c '
            import json, sys
            diff_content = open("diff.txt").read()
            payload = {
                "contents": [{
                    "parts": [{
                        "text": f"Review this code diff and suggest improvements:\n\n{diff_content}"
                    }]
                }]
            }
            with open("payload.json", "w") as f:
                json.dump(payload, f)
            '

          # 2. Call the API using the safely generated file
          curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GOOGLE_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json

          # 3. Print the response
          cat response.json