name: AI Code Review and Test

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Generate Gemini Payload
        run: |
          python3 << 'EOF'
          import json
          import os
          try:
              with open("diff.txt", "r") as f:
                  diff_content = f.read()
              payload = {
                  "contents": [{
                      "parts": [{
                          "text": f"Act as a senior developer. Review this code diff and suggest improvements or identify bugs:\n\n{diff_content}"
                      }]
                  }]
              }
              with open("payload.json", "w") as f:
                  json.dump(payload, f)
          except Exception as e:
              print(f"Error creating payload: {e}")
              exit(1)
          EOF

      - name: Call Gemini API
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=$GOOGLE_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json

      - name: Display Review Results
        run: |
          python3 << 'EOF'
          import json
          import sys
          try:
              with open('response.json') as f:
                  data = json.load(f)
              
              if 'candidates' in data:
                  print("### AI Code Review Result")
                  # Using sys.stdout.write to avoid extra newlines if needed
                  print(data['candidates'][0]['content']['parts'][0]['text'])
              elif 'error' in data:
                  print("### API Error Response")
                  print(json.dumps(data['error'], indent=2))
                  sys.exit(1)
              else:
                  print("Unexpected Response Format")
                  print(data)
                  sys.exit(1)
          except Exception as e:
              print(f"Failed to parse response: {e}")
              sys.exit(1)
          EOF

  run-tests:
    runs-on: ubuntu-latest
    needs: review # Matches the job name above
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test