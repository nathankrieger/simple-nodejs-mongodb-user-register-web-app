name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Call Gemini API
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          curl -s https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GOOGLE_API_KEY" \
            -d '{
              "contents": [{
                "parts": [{
                  "text": "Review this code diff:\n\n'"$(cat diff.txt | sed 's/"/\\"/g')"'" 
                }]
              }]
            }' > response.json

          cat response.json