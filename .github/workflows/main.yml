name: AI Code Review and Test

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # The AI Review job is commented out to disable it for now
  # review:
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: read
  #     pull-requests: write
  #   steps:
  #     - name: Checkout Repository
  #       uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0
  #     ... [rest of the review steps] ...

  run-tests:
    runs-on: ubuntu-latest
    # Removed "needs: review" so this job runs independently
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test