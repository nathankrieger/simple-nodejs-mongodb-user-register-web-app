name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to compare branches

      - name: Get PR diff
        id: diff
        run: |
          # Fetch the base branch to ensure git can see the differences
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Generate Gemini Payload
        # We use Python to safely handle special characters/newlines in the code diff
        run: |
          python3 << 'EOF'
          import json
          import os

          try:
              with open("diff.txt", "r") as f:
                  diff_content = f.read()

              # Construct the Gemini API structure
              payload = {
                  "contents": [{
                      "parts": [{
                          "text": f"Act as a senior developer. Review this code diff and suggest improvements or identify bugs:\n\n{diff_content}"
                      }]
                  }]
              }

              with open("payload.json", "w") as f:
                  json.dump(payload, f)
              print("Successfully created payload.json")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          EOF

      - name: Call Gemini API
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=$GOOGLE_API_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json

      - name: Display Review Results
        run: |
          # Use Python to check if 'candidates' exists (Success) or 'error' exists (Failure)
          python3 << 'EOF'
          import json
          try:
              with open('response.json') as f:
                  data = json.load(f)
              
              if 'candidates' in data:
                  print("### AI Code Review Result")
                  print(data['candidates'][0]['content']['parts'][0]['text'])
              elif 'error' in data:
                  print("### API Error")
                  print(json.dumps(data['error'], indent=2))
                  exit(1)
              else:
                  print("Unexpected Response Format")
                  print(data)
                  exit(1)
          except Exception as e:
              print(f"Failed to parse response: {e}")
              exit(1)
          EOF